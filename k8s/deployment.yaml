```yaml id="mjlwmr"
apiVersion: apps/v1
kind: Deployment

metadata:
  name: food-delivery

spec:
  replicas: 2

  selector:
    matchLabels:
      app: food-delivery

  template:
    metadata:
      labels:
        app: food-delivery

    spec:
      containers:

      - name: food-delivery

        image: sujaygope9939/food-delivery-app:latest

        imagePullPolicy: Always

        ports:
        - containerPort: 8080

        resources:

          requests:
            cpu: "200m"
            memory: "256Mi"

          limits:
            cpu: "500m"
            memory: "512Mi"

        readinessProbe:
          httpGet:
            path: /
            port: 8080

          initialDelaySeconds: 10
          periodSeconds: 5

        livenessProbe:
          httpGet:
            path: /
            port: 8080

          initialDelaySeconds: 30
          periodSeconds: 10
```

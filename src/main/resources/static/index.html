<!DOCTYPE html>
<html>

<head>
    <title>Food Delivery App</title>
</head>

<body>

<h1>Food Delivery Website</h1>

<button onclick="loadMenu()">
Show Menu
</button>

<pre id="menu"></pre>

<hr>

<h2>Place Order</h2>

<form id="orderForm">

    Food Item

    <input
            type="text"
            id="item"
            required>

    <br><br>

    Quantity

    <input
            type="number"
            id="quantity"
            required>

    <br><br>

    <button type="submit">
        Order Now
    </button>

</form>

<h3 id="result"></h3>

<script>

async function loadMenu(){

const response =
await fetch("/api/menu");

const data =
await response.text();

document
.getElementById("menu")
.innerText = data;

}

document
.getElementById("orderForm")
.addEventListener(
"submit",
async function(e){

e.preventDefault();

const item =
document.getElementById("item").value;

const quantity =
document.getElementById("quantity").value;

const response =
await fetch(
`/api/order?item=${item}&quantity=${quantity}`,
{
method:"POST"
}
);

const result =
await response.text();

document
.getElementById("result")
.innerText = result;

});

</script>

</body>
</html>
